<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="url(#bgGrad)" rx="12"/>

  <text x="550" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Research Methodology Flowchart</text>
  <text x="550" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Six-Phase Iterative Approach for LSTM-Based Intrusion Detection</text>

  <!-- PHASE 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="220" height="130" rx="10" fill="url(#stepGrad)" opacity="0.95"/>
    <text x="150" y="128" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">PHASE 1</text>
    <text x="150" y="148" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Data Collection</text>
    <line x1="60" y1="160" x2="240" y2="160" stroke="#a5b4fc" stroke-width="0.5"/>
    <text x="150" y="180" text-anchor="middle" fill="#c7d2fe" font-size="11">Download 3 benchmark datasets:</text>
    <text x="150" y="196" text-anchor="middle" fill="#c7d2fe" font-size="10">NSL-KDD, CICIDS2017,</text>
    <text x="150" y="210" text-anchor="middle" fill="#c7d2fe" font-size="10">UNSW-NB15</text>
  </g>

  <line x1="260" y1="165" x2="290" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- PHASE 2 -->
  <g filter="url(#shadow)">
    <rect x="295" y="100" width="220" height="130" rx="10" fill="url(#stepGrad)" opacity="0.95"/>
    <text x="405" y="128" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">PHASE 2</text>
    <text x="405" y="148" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Preprocessing</text>
    <line x1="315" y1="160" x2="495" y2="160" stroke="#a5b4fc" stroke-width="0.5"/>
    <text x="405" y="180" text-anchor="middle" fill="#c7d2fe" font-size="11">Clean, encode features,</text>
    <text x="405" y="196" text-anchor="middle" fill="#c7d2fe" font-size="10">normalize (MinMax [0,1]),</text>
    <text x="405" y="210" text-anchor="middle" fill="#c7d2fe" font-size="10">build sliding windows</text>
  </g>

  <line x1="515" y1="165" x2="545" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- PHASE 3 -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="220" height="130" rx="10" fill="url(#stepGrad)" opacity="0.95"/>
    <text x="660" y="128" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">PHASE 3</text>
    <text x="660" y="148" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Model Design</text>
    <line x1="570" y1="160" x2="750" y2="160" stroke="#a5b4fc" stroke-width="0.5"/>
    <text x="660" y="180" text-anchor="middle" fill="#c7d2fe" font-size="11">Stacked LSTM (128→64)</text>
    <text x="660" y="196" text-anchor="middle" fill="#c7d2fe" font-size="10">+ Dense 32 + BatchNorm</text>
    <text x="660" y="210" text-anchor="middle" fill="#c7d2fe" font-size="10">+ Dropout(0.2) + Softmax</text>
  </g>

  <line x1="770" y1="165" x2="800" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- PHASE 4 -->
  <g filter="url(#shadow)">
    <rect x="805" y="100" width="220" height="130" rx="10" fill="url(#stepGrad)" opacity="0.95"/>
    <text x="915" y="128" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">PHASE 4</text>
    <text x="915" y="148" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Training</text>
    <line x1="825" y1="160" x2="1005" y2="160" stroke="#a5b4fc" stroke-width="0.5"/>
    <text x="915" y="180" text-anchor="middle" fill="#c7d2fe" font-size="11">Adam optimizer (lr=1e-3)</text>
    <text x="915" y="196" text-anchor="middle" fill="#c7d2fe" font-size="10">Early stopping (patience=10)</text>
    <text x="915" y="210" text-anchor="middle" fill="#c7d2fe" font-size="10">Max 200 epochs, batch 64</text>
  </g>

  <!-- ARROW DOWN -->
  <line x1="915" y1="230" x2="915" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- PHASE 5 -->
  <g filter="url(#shadow)">
    <rect x="805" y="285" width="220" height="120" rx="10" fill="url(#stepGrad)" opacity="0.95"/>
    <text x="915" y="313" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">PHASE 5</text>
    <text x="915" y="333" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Evaluation</text>
    <line x1="825" y1="345" x2="1005" y2="345" stroke="#a5b4fc" stroke-width="0.5"/>
    <text x="915" y="365" text-anchor="middle" fill="#c7d2fe" font-size="11">Accuracy, Precision, Recall</text>
    <text x="915" y="381" text-anchor="middle" fill="#c7d2fe" font-size="10">F1-Score, ROC-AUC, Confusion Matrix</text>
  </g>

  <!-- DECISION DIAMOND -->
  <g filter="url(#shadow)">
    <polygon points="660,405 780,465 660,525 540,465" fill="url(#decisionGrad)" opacity="0.95"/>
    <text x="660" y="460" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Results</text>
    <text x="660" y="478" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Satisfactory?</text>
  </g>

  <!-- YES PATH -->
  <line x1="780" y1="465" x2="805" y2="465" stroke="#22c55e" stroke-width="2"/>
  <text x="810" y="458" fill="#22c55e" font-size="12" font-weight="bold">Yes</text>

  <!-- PHASE 6 -->
  <g filter="url(#shadow)">
    <rect x="805" y="430" width="220" height="105" rx="10" fill="url(#outputGrad)" opacity="0.95"/>
    <text x="915" y="458" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="bold">PHASE 6</text>
    <text x="915" y="478" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Report</text>
    <line x1="825" y1="490" x2="1005" y2="490" stroke="#a7f3d0" stroke-width="0.5"/>
    <text x="915" y="510" text-anchor="middle" fill="#d1fae5" font-size="11">Document findings,</text>
    <text x="915" y="525" text-anchor="middle" fill="#d1fae5" font-size="10">compare baselines</text>
  </g>

  <!-- NO PATH (REVISE) -->
  <line x1="660" y1="525" x2="660" y2="565" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="680" y="555" fill="#ef4444" font-size="12" font-weight="bold">No</text>

  <g filter="url(#shadow)">
    <rect x="545" y="570" width="230" height="70" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="660" y="600" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">REVISE &amp; ITERATE</text>
    <text x="660" y="620" text-anchor="middle" fill="#94a3b8" font-size="10">Adjust hyperparameters,</text>
    <text x="660" y="633" text-anchor="middle" fill="#94a3b8" font-size="10">modify architecture, retune</text>
  </g>

  <!-- Feedback arrow back to Phase 3 -->
  <path d="M545,605 L120,605 L120,250 L405,250 L405,230" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowW)" stroke-dasharray="8,4"/>
  <text x="120" y="430" fill="#ef4444" font-size="11" font-weight="bold" transform="rotate(-90,120,430)">Iteration Feedback Loop</text>

  <!-- LEGEND -->
  <g transform="translate(40, 670)">
    <rect x="0" y="0" width="1020" height="90" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="510" y="25" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Methodology Legend</text>

    <rect x="30" y="40" width="16" height="16" rx="3" fill="url(#stepGrad)"/>
    <text x="55" y="53" fill="#cbd5e1" font-size="11">Research Phase</text>

    <rect x="200" y="40" width="16" height="16" rx="3" fill="url(#decisionGrad)"/>
    <text x="225" y="53" fill="#cbd5e1" font-size="11">Decision Point</text>

    <rect x="380" y="40" width="16" height="16" rx="3" fill="url(#outputGrad)"/>
    <text x="405" y="53" fill="#cbd5e1" font-size="11">Final Output</text>

    <rect x="540" y="40" width="16" height="16" rx="3" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="565" y="53" fill="#cbd5e1" font-size="11">Iteration/Revision</text>

    <line x1="740" y1="48" x2="800" y2="48" stroke="#22c55e" stroke-width="2"/>
    <text x="810" y="53" fill="#cbd5e1" font-size="11">Yes (Proceed)</text>

    <line x1="740" y1="68" x2="800" y2="68" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="810" y="73" fill="#cbd5e1" font-size="11">No (Revise)</text>
  </g>
</svg>